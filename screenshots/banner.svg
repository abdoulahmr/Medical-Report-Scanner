<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)" />

  <g transform="translate(900, 200)">
    <circle r="120" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="8 8" />
    <circle r="160" fill="none" stroke="#1e293b" stroke-width="1" />
    
    <g transform="translate(-50, -50) scale(1.6)">
      <rect x="10" y="10" width="44" height="54" rx="4" fill="none" stroke="#38bdf8" stroke-width="3" />
      <line x1="20" y1="23" x2="35" y2="23" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" />
      <line x1="20" y1="35" x2="44" y2="35" stroke="#64748b" stroke-width="2" stroke-linecap="round" />
      <line x1="20" y1="45" x2="38" y2="45" stroke="#64748b" stroke-width="2" stroke-linecap="round" />
      
      <path d="M22,25 L26,29 L34,19" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="translate(18, -2) scale(0.7)"/>
    </g>

    <path d="M-180, -20 L180, -20" stroke="url(#accent)" stroke-width="2" opacity="0.8" />
    <polygon points="-180,-20 180,-20 160,80 -160,80" fill="url(#glow)" />
  </g>

  <g transform="translate(100, 180)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="54" font-weight="800" fill="#ffffff" letter-spacing="-1">
      Medical Report Scanner
    </text>
    <text x="0" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="url(#accent)" letter-spacing="4">
      AUTOMATED EXTRACTION &amp; ANALYSIS
    </text>
    <text x="0" y="110" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#94a3b8">
      From Paper to Insights: Smart Medical Data Extraction.
    </text>
  </g>
</svg>
